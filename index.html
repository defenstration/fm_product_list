<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product list with cart</title>

  <link rel = "stylesheet" href="styles.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:ital,wght@0,300..700;1,300..700&display=swap" rel="stylesheet">

</head>

<body>
  <header class = "sr-only">
    <h1>Product List solution for Frontend Mentor by Defenstration</h1>
  </header>
  <main>
    <h2 class = "page-title">Desserts</h2>

    <div id = "item-wrapper">

    </div>

    <div class = "cart-header">
      <h4>Your Cart (<!-- Quantity -->)</h4>
    </div>

    <div id = "cart-wrapper">
      <img src = "product-list-with-cart-main/assets/images/illustration-empty-cart.svg" alt = "Empty cart icon">
      <p class = "cart-contents">Your added items will appear here</p>
    </div>
  
  </main>

  <footer>
    <div class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Defenstration</a>.
    </div>
  </footer>

  <script src = "script.js"></script>
</body>
</html>
